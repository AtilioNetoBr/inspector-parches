<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Plantilla 7x7 / 5x5</title>
<style>
@page{size:A4;margin:20mm}body{font-family:Arial,sans-serif;color:#111}.card{width:70mm;height:70mm;background:#fff;border:0.4mm solid #111;display:flex;align-items:center;justify-content:center;box-sizing:border-box}.inner{width:50mm;height:50mm;background:#000}.wrap{display:flex;gap:25mm;align-items:flex-start}.note{max-width:90mm;font-size:12pt;line-height:1.35}h1{font-size:18pt}button{margin-bottom:15mm;padding:10px 14px;font-weight:bold}@media print{button{display:none}}
</style></head><body>
<button onclick="window.print()">Imprimir al 100%</button>
<div class="wrap">
  <div><div class="card"><div class="inner"></div></div></div>
  <div class="note"><h1>Plantilla de calibración</h1><p>Exterior blanco: <b>7 × 7 cm</b>.</p><p>Interior negro: <b>5 × 5 cm</b>.</p><p>Debe imprimirse al <b>100%</b>, sin “ajustar a página”. Verifica con regla antes de usar.</p><p>El borde blanco debe medir 1 cm por lado.</p></div>
</div>
</body></html>
